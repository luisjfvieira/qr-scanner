<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.3/dist/heic2any.min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
    .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
    #status { margin: 20px 0; padding: 15px; border-radius: 8px; font-weight: bold; }
    .btn-camera { background: #007bff; color: white; padding: 20px; width: 100%; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; display: block; }
    #canvas { display: none; }
    .loading { background: #fff3cd; color: #856404; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>

  <div class="card">
    <h2>Leitor GitHub -> Excel</h2>
    <div id="status">Pronto para digitalizar</div>
    
    <label for="cameraInput" class="btn-camera">📸 TIRAR FOTO (QR CODE)</label>
    <input type="file" id="cameraInput" accept="image/*,.heic" capture="environment" style="display:none;">
    
    <canvas id="canvas"></canvas>
  </div>

  <script>
    // COLOCA AQUI O TEU URL DO GOOGLE SCRIPT (O que copiaste no passo anterior)
    const WEB_APP_URL = "TEU_URL_AQUI"; 

    const input = document.getElementById('cameraInput');
    const status = document.getElementById('status');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    input.addEventListener('change', async function(e) {
      let file = e.target.files[0];
      if (!file) return;

      status.innerText = "A processar...";
      status.className = "loading";

      if (file.name.toLowerCase().endsWith(".heic")) {
        status.innerText = "A converter HEIC...";
        file = await heic2any({ blob: file, toType: "image/jpeg", quality: 0.7 });
      }

      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height);

          if (code) {
            enviarParaGoogle(code.data);
          } else {
            status.innerText = "❌ QR não encontrado.";
            status.className = "error";
          }
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    function enviarParaGoogle(texto) {
      status.innerText = "A enviar para o Excel...";
      
      // Como o Google Scripts tem restrições de CORS, enviamos como texto simples
      fetch(WEB_APP_URL, {
        method: "POST",
        mode: "no-cors", 
        body: JSON.stringify({ valor: texto })
      })
      .then(() => {
        status.innerText = "✅ ENVIADO! Verifique o Excel em segundos.";
        status.className = "success";
      })
      .catch(err => {
        status.innerText = "❌ Erro na ligação.";
        status.className = "error";
      });
    }
  </script>
</body>
</html>
